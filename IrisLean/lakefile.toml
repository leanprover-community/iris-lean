name = "iris"
defaultTargets = ["Iris", "IrisTest"]

[[require]]
name = "Qq"
scope = "leanprover-community"
rev = "v4.29.0"

[[require]]
name = "batteries"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "Iris"

[[lean_lib]]
name = "IrisTest"
globs = ["Iris.*"]

[[lean_exe]]
name = "dumpPortingData"
srcDir = "Iris/Std"
root = "DumpPortingData"
supportInterpreter = true
